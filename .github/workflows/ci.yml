# Validación en GitHub: calidad + deps. El despliegue lo orquesta Coolify (rama de producción configurada allí).
# TODO: Si next build exige variables obligatorias sin default, añadir env: con secrets de repo o valores placeholder de CI.
name: CI

on:
  push:
    branches: [main, desarrollo]
  pull_request:
    branches: [main, desarrollo]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-front-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-audit:
    name: Lint, build y npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: npm audit (falla en alto o crítico)
        run: npm audit --audit-level=high
